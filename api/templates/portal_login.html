<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>세일즈 액션 플랫폼 로그인 | 동원홈푸드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="/static/admin.css?v={{ asset_v }}" rel="stylesheet">
</head>
<body class="portal-login-body">
  <main class="portal-login-wrap">
    <section class="portal-login-hero">
      <img src="/static/dongwon-homefood-logo.png" alt="동원홈푸드">
      <p class="eyebrow">SALES ACTION PLATFORM</p>
      <h1>데이터에서 바로<br>고객 액션으로 연결합니다.</h1>
      <p>브랜드별 매출, CM, 채권, 상품 구성비를 기반으로 범용상품 제안 솔루션을 테스트합니다.</p>
      <div class="portal-chip">BETA ACCESS · 2026.08.03 전체 오픈</div>
    </section>
    <section class="portal-login-card">
      <h2>플랫폼 로그인</h2>
      <p>현재 테스트 단계에서는 사번만 입력합니다. 8월 3일 전까지는 선정된 베타테스터와 관리자만 접속할 수 있습니다.</p>
      {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
      <form method="post" action="/portal/login" class="login-form">
        <label>사번<input name="emp_code" inputmode="numeric" autocomplete="username" placeholder="사번 입력" autofocus></label>
        <button class="btn primary full" type="submit">로그인</button>
      </form>
      <p class="login-note">비밀번호 없는 임시 테스트 로그인입니다. 모든 로그인 시도는 관리자 활동내역에 기록됩니다.</p>
    </section>
  </main>
</body>
</html>
